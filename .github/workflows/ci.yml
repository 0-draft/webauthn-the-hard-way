name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        run: pytest -v

  lint:
    name: ruff (lint + format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install "ruff>=0.6"

      - name: ruff check (lint)
        run: ruff check .

      - name: ruff format --check
        run: ruff format --check .

  smoke-server:
    name: Flask app boots and /register/begin returns 200
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Verify all routes register and /register/begin returns valid JSON
        run: |
          python - <<'PY'
          import json
          from server.app import create_app

          app = create_app()
          # Confirm every route we promised is wired up.
          expected = {
              "/", "/static/<path:filename>",
              "/register/begin", "/register/complete",
              "/authenticate/begin", "/authenticate/complete",
              "/credentials", "/credentials/reset",
          }
          rules = {r.rule for r in app.url_map.iter_rules()}
          missing = expected - rules
          assert not missing, f"missing routes: {missing}"

          with app.test_client() as c:
              res = c.post("/register/begin", json={"username": "ci"})
              assert res.status_code == 200, res.status_code
              data = res.get_json()
              assert data["rp"]["id"] == "localhost"
              assert -7 in [p["alg"] for p in data["pubKeyCredParams"]]
              assert len(data["challenge"]) >= 40  # base64url of 32 bytes
              print("smoke OK:", json.dumps({"challenge_len": len(data["challenge"]), "algs": [p["alg"] for p in data["pubKeyCredParams"]]}))
          PY
